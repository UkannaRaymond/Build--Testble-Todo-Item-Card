<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Item Card</title>
  <link rel="stylesheet" href="todo-item-card.css" />
</head>
<body>

  <article data-testid="test-todo-card" id="todo-card">

    <div class="card-header">
      <div class="checkbox-wrap">
        <label for="todo-toggle" class="sr-only">Mark task as complete</label>
        <input
          type="checkbox"
          id="todo-toggle"
          data-testid="test-todo-complete-toggle"
          onchange="toggleComplete(this)"
        />
      </div>

      <div class="title-row">
        <h2 data-testid="test-todo-title" id="todo-title">
          Redesign onboarding flow for mobile
        </h2>
        <div class="badge-row">
          <span data-testid="test-todo-priority" id="todo-priority" class="priority-high">
            High
          </span>
          <span
            data-testid="test-todo-status"
            id="todo-status"
            class="status-in-progress"
            aria-label="Status: In progress"
          >
            In progress
          </span>
        </div>
      </div>
    </div>

    <p data-testid="test-todo-description">
      Audit the current 7-step onboarding, reduce drop-off points, and ship a
      revised 3-step flow with contextual tooltips. Coordinate with the growth
      and design teams before the sprint review.
    </p>

    <div class="meta-row">
      <time
        data-testid="test-todo-due-date"
        id="todo-due-date"
        datetime=""
        aria-label="Due date"
      >
        <span aria-hidden="true">📅</span>
        <span id="due-date-text"></span>
      </time>
      <div class="meta-divider" aria-hidden="true"></div>
      <time
        data-testid="test-todo-time-remaining"
        id="todo-time-remaining"
        datetime=""
        aria-label="Time remaining"
      >
        <span aria-hidden="true">⏱</span>
        <span id="time-remaining-text"></span>
      </time>
    </div>

    <ul data-testid="test-todo-tags" role="list">
      <li><span data-testid="test-todo-tag-design">Design</span></li>
      <li><span data-testid="test-todo-tag-mobile">Mobile</span></li>
      <li><span data-testid="test-todo-tag-growth">Growth</span></li>
      <li><span data-testid="test-todo-tag-sprint">Sprint</span></li>
    </ul>

    <div class="card-actions">
      <button data-testid="test-todo-edit-button" aria-label="Edit task">
        Edit
      </button>
      <button data-testid="test-todo-delete-button" aria-label="Delete task">
        Delete
      </button>
    </div>

  </article>

  <script>
    const DUE = new Date(Date.now() + (3 * 24 + 5) * 60 * 60 * 1000);

    function formatDate(d) {
      return d.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    }

    function formatRelative(target) {
      const diff = target - Date.now();
      const abs  = Math.abs(diff);
      const mins = Math.floor(abs / 60000);
      const hrs  = Math.floor(abs / 3600000);
      const days = Math.floor(abs / 86400000);
      let str, cls = '';

      if (diff < 0) {
        cls = 'overdue';
        if (mins < 60)      str = `Overdue by ${mins} min${mins !== 1 ? 's' : ''}`;
        else if (hrs < 24)  str = `Overdue by ${hrs} hr${hrs !== 1 ? 's' : ''}`;
        else                str = `Overdue by ${days} day${days !== 1 ? 's' : ''}`;
      } else {
        if (hrs < 2)        { cls = 'soon'; str = `Due in ${mins} min${mins !== 1 ? 's' : ''}`; }
        else if (hrs < 24)  { cls = 'soon'; str = `Due in ${hrs} hr${hrs !== 1 ? 's' : ''}`; }
        else if (days <= 3) { cls = 'soon'; str = `Due in ${days} day${days !== 1 ? 's' : ''}`; }
        else                str = `Due in ${days} days`;
      }
      return { str, cls };
    }

    function updateTimes() {
      const dueEl = document.getElementById('todo-due-date');
      const remEl = document.getElementById('todo-time-remaining');

      dueEl.setAttribute('datetime', DUE.toISOString());
      document.getElementById('due-date-text').textContent = 'Due ' + formatDate(DUE);

      const { str, cls } = formatRelative(DUE);
      remEl.setAttribute('datetime', DUE.toISOString());
      document.getElementById('time-remaining-text').textContent = str;
      remEl.className = cls;
      remEl.setAttribute('aria-label', str);
    }

    function toggleComplete(cb) {
      const card   = document.getElementById('todo-card');
      const title  = document.getElementById('todo-title');
      const status = document.getElementById('todo-status');

      if (cb.checked) {
        card.classList.add('completed');
        title.classList.add('done');
        status.textContent = 'Done';
        status.className   = 'status-done';
        status.setAttribute('aria-label', 'Status: Done');
      } else {
        card.classList.remove('completed');
        title.classList.remove('done');
        status.textContent = 'In progress';
        status.className   = 'status-in-progress';
        status.setAttribute('aria-label', 'Status: In progress');
      }
    }

    updateTimes();
    setInterval(updateTimes, 45000);

    // --- Delete ---
    document.querySelector('[data-testid="test-todo-delete-button"]').addEventListener('click', function () {
      if (!confirm('Delete this task?')) return;
      const card = document.getElementById('todo-card');
      card.style.transition = 'opacity 0.25s, transform 0.25s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.97)';
      setTimeout(() => card.remove(), 260);
    });

    // --- Edit ---
    const editBtn = document.querySelector('[data-testid="test-todo-edit-button"]');
    let editing = false;

    editBtn.addEventListener('click', function () {
      editing ? saveEdit() : openEdit();
    });

    function openEdit() {
      editing = true;
      editBtn.textContent = 'Save';

      // Title → input
      const titleEl = document.getElementById('todo-title');
      const titleInput = document.createElement('input');
      titleInput.type = 'text';
      titleInput.className = 'edit-input';
      titleInput.id = 'edit-title';
      titleInput.value = titleEl.textContent.trim();
      titleEl.replaceWith(titleInput);

      // Description → textarea
      const descEl = document.querySelector('[data-testid="test-todo-description"]');
      const textarea = document.createElement('textarea');
      textarea.className = 'edit-textarea';
      textarea.id = 'edit-desc';
      textarea.value = descEl.textContent.trim();
      descEl.replaceWith(textarea);

      // Priority → select
      const priorityEl = document.getElementById('todo-priority');
      const prioritySelect = document.createElement('select');
      prioritySelect.className = 'edit-select';
      prioritySelect.id = 'edit-priority';
      [['high','High'],['medium','Medium'],['low','Low']].forEach(([val, label]) => {
        const opt = document.createElement('option');
        opt.value = val; opt.textContent = label;
        if (priorityEl.className.includes(val)) opt.selected = true;
        prioritySelect.appendChild(opt);
      });
      priorityEl.replaceWith(prioritySelect);

      titleInput.focus();
    }

    function saveEdit() {
      editing = false;
      editBtn.textContent = 'Edit';

      // Title
      const titleInput = document.getElementById('edit-title');
      const titleEl = document.createElement('h2');
      titleEl.dataset.testid = 'test-todo-title';
      titleEl.id = 'todo-title';
      titleEl.textContent = titleInput.value.trim() || 'Untitled task';
      if (document.getElementById('todo-toggle').checked) titleEl.classList.add('done');
      titleInput.replaceWith(titleEl);

      // Description
      const textarea = document.getElementById('edit-desc');
      const descEl = document.createElement('p');
      descEl.dataset.testid = 'test-todo-description';
      descEl.textContent = textarea.value.trim();
      textarea.replaceWith(descEl);

      // Priority
      const prioritySelect = document.getElementById('edit-priority');
      const val = prioritySelect.value;
      const priorityEl = document.createElement('span');
      priorityEl.dataset.testid = 'test-todo-priority';
      priorityEl.id = 'todo-priority';
      priorityEl.className = `priority-${val}`;
      priorityEl.textContent = val.charAt(0).toUpperCase() + val.slice(1);
      prioritySelect.replaceWith(priorityEl);
    }
  </script>

</body>
</html>
